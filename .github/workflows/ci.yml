name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_PROMPT_DISABLED: '1'
      GH_TELEMETRY: 'false'
      PYTHONPYCACHEPREFIX: /tmp/socratic-pycache
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Install schema validation dependencies
        run: python3 -m pip install --quiet jsonschema referencing

      - name: Check repository consistency
        run: python3 scripts/check_repository.py

      - name: Test validation scripts
        run: |
          python3 -m compileall -q scripts tests
          python3 -B -m unittest discover -s tests -t . -p 'test_*.py'

      - name: Run executable demos
        run: |
          python3 -m demo.subscription_renewal.run_demo
          python3 -m demo.refactor_guard.run_demo
          python3 -m demo.test_assessment.run_demo

      - name: Validate demo fixtures against schemas
        run: python3 scripts/validate_fixtures.py

      - name: Validate Agent Skills metadata
        run: gh skill publish --dry-run

      - name: Audit source distribution
        run: |
          python3 scripts/audit_distribution.py \
            --manifest-output "$RUNNER_TEMP/distribution-manifest.json" \
            --skill-sums-output "$RUNNER_TEMP/SKILL_SHA256SUMS" \
            --plugin-manifest-output "$RUNNER_TEMP/plugin-distribution-manifest.json" \
            --plugin-sums-output "$RUNNER_TEMP/PLUGIN_SHA256SUMS"

      - name: Verify installed distribution
        run: |
          gh skill install "$GITHUB_WORKSPACE" \
            --from-local \
            --all \
            --dir "$RUNNER_TEMP/installed-skills"
          python3 scripts/audit_distribution.py \
            --installed-dir "$RUNNER_TEMP/installed-skills"

      - name: Upload distribution evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: distribution-audit
          path: |
            ${{ runner.temp }}/distribution-manifest.json
            ${{ runner.temp }}/SKILL_SHA256SUMS
            ${{ runner.temp }}/plugin-distribution-manifest.json
            ${{ runner.temp }}/PLUGIN_SHA256SUMS
          if-no-files-found: error
