name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (semver, e.g. 0.2.0 — leading "v" is stripped)'
        required: true
        type: string
      draft:
        description: 'Create as draft release'
        required: false
        type: boolean
        default: false
      prerelease:
        description: 'Mark as prerelease'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Create tag and GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPYCACHEPREFIX: /tmp/socratic-pycache
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate repository
        run: |
          python3 scripts/check_repository.py
          python3 -m compileall -q scripts

      - name: Validate inputs and branch
        id: validate
        env:
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${INPUT_VERSION#v}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid semver: $version"
            exit 1
          fi
          tag="v$version"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "::error::Tag $tag already exists"
            exit 1
          fi
          if [[ "$REF_NAME" != "main" ]]; then
            echo "::error::Releases must be cut from main (dispatched from: $REF_NAME)"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create and push annotated tag
        env:
          TAG: ${{ steps.validate.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.validate.outputs.tag }}
          DRAFT: ${{ inputs.draft }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          args=("$TAG" --verify-tag --title "$TAG" --generate-notes --target "$GITHUB_SHA")
          [[ "$DRAFT" == "true" ]] && args+=(--draft)
          [[ "$PRERELEASE" == "true" ]] && args+=(--prerelease)
          gh release create "${args[@]}"

      - name: Summarize release
        env:
          TAG: ${{ steps.validate.outputs.tag }}
        run: |
          {
            echo "## Released $TAG"
            echo
            echo "Commit: \`$GITHUB_SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"
