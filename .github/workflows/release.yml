name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Create tag and GitHub Release
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_PROMPT_DISABLED: '1'
      GH_TELEMETRY: 'false'
      PYTHONPYCACHEPREFIX: /tmp/socratic-pycache
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Read release version
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_BRANCH: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
        run: |
          set -euo pipefail
          if [[ "$SOURCE_BRANCH" != "main" ]]; then
            echo "::error::Releases must be cut from main (received: $SOURCE_BRANCH)"
            exit 1
          fi

          version=$(tr -d '[:space:]' < VERSION)
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid semver in VERSION: $version"
            exit 1
          fi

          tag="v$version"
          release_sha=$(git rev-parse HEAD)
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "::notice::Release $tag already exists; no release is needed"
              echo "release_needed=false" >> "$GITHUB_OUTPUT"
              echo "tag_needed=false" >> "$GITHUB_OUTPUT"
            else
              tag_sha=$(git rev-list -n 1 "$tag")
              if [[ "$tag_sha" != "$release_sha" ]]; then
                echo "::error::$tag exists at $tag_sha but the current commit is $release_sha"
                exit 1
              fi
              echo "::notice::$tag exists without a GitHub Release; resuming publication"
              echo "release_needed=true" >> "$GITHUB_OUTPUT"
              echo "tag_needed=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "release_needed=true" >> "$GITHUB_OUTPUT"
            echo "tag_needed=true" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_sha=$release_sha" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        if: steps.release.outputs.release_needed == 'true'
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Validate repository
        if: steps.release.outputs.release_needed == 'true'
        run: |
          python3 scripts/check_repository.py
          python3 -m compileall -q scripts
          python3 -m unittest discover -s scripts -p 'test_*.py'
          gh skill publish --dry-run

      - name: Verify installed distribution
        if: steps.release.outputs.release_needed == 'true'
        run: |
          gh skill install "$GITHUB_WORKSPACE" \
            --from-local \
            --all \
            --dir "$RUNNER_TEMP/installed-skills"
          python3 scripts/audit_distribution.py \
            --installed-dir "$RUNNER_TEMP/installed-skills"

      - name: Build release assets
        if: steps.release.outputs.release_needed == 'true'
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          python3 scripts/audit_distribution.py \
            --manifest-output dist/distribution-manifest.json \
            --skill-sums-output dist/SKILL_SHA256SUMS
          for skill in socratic maieutic elenchus; do
            git archive \
              --format=zip \
              --prefix="$skill/" \
              --output="dist/$skill-$TAG.zip" \
              "HEAD:skills/$skill"
          done
          git archive \
            --format=zip \
            --prefix="socratic-suite-$TAG/" \
            --output="dist/socratic-suite-$TAG.zip" \
            HEAD skills
          (
            cd dist
            sha256sum -- *.zip > SHA256SUMS
          )

      - name: Create and push annotated tag
        if: steps.release.outputs.release_needed == 'true' && steps.release.outputs.tag_needed == 'true'
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: steps.release.outputs.release_needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
          RELEASE_SHA: ${{ steps.release.outputs.release_sha }}
        run: |
          set -euo pipefail
          args=("$TAG" --verify-tag --title "$TAG" --generate-notes --target "$RELEASE_SHA" --fail-on-no-commits)
          gh release create "${args[@]}" \
            dist/*.zip \
            dist/SHA256SUMS \
            dist/SKILL_SHA256SUMS \
            dist/distribution-manifest.json

      - name: Verify immutable release and assets
        if: steps.release.outputs.release_needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          max_attempts=30
          retry_delay_seconds=10
          for attempt in $(seq 1 "$max_attempts"); do
            if verification_output=$(gh release verify "$TAG" 2>&1); then
              echo "$verification_output"
              break
            fi

            echo "$verification_output"
            if [[ "$verification_output" != *"no attestations for tag"* ]]; then
              echo "::error::Release verification failed for a non-retryable reason"
              exit 1
            fi
            if [[ "$attempt" -eq "$max_attempts" ]]; then
              echo "::error::Release attestation was not available after $max_attempts attempts"
              exit 1
            fi

            echo "::notice::Release attestation is not available yet; retrying in ${retry_delay_seconds}s ($attempt/$max_attempts)"
            sleep "$retry_delay_seconds"
          done

          for asset in dist/*; do
            gh release verify-asset "$TAG" "$asset"
          done

      - name: Summarize release
        if: steps.release.outputs.release_needed == 'true'
        env:
          TAG: ${{ steps.release.outputs.tag }}
          RELEASE_SHA: ${{ steps.release.outputs.release_sha }}
        run: |
          {
            echo "## Released $TAG"
            echo
            echo "Commit: \`$RELEASE_SHA\`"
            echo
            echo "Assets:"
            find dist -maxdepth 1 -type f -print | sort | sed 's#^#- #'
          } >> "$GITHUB_STEP_SUMMARY"
