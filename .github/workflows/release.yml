name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (semver, e.g. 0.2.0 — leading "v" is stripped)'
        required: true
        type: string
      draft:
        description: 'Create as draft release'
        required: false
        type: boolean
        default: false
      prerelease:
        description: 'Mark as prerelease'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Create tag and GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_PROMPT_DISABLED: '1'
      GH_TELEMETRY: 'false'
      PYTHONPYCACHEPREFIX: /tmp/socratic-pycache
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Validate repository
        run: |
          python3 scripts/check_repository.py
          python3 -m compileall -q scripts
          python3 -m unittest discover -s scripts -p 'test_*.py'
          gh skill publish --dry-run

      - name: Verify installed distribution
        run: |
          gh skill install "$GITHUB_WORKSPACE" \
            --from-local \
            --all \
            --dir "$RUNNER_TEMP/installed-skills"
          python3 scripts/audit_distribution.py \
            --installed-dir "$RUNNER_TEMP/installed-skills"

      - name: Validate inputs and branch
        id: validate
        env:
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${INPUT_VERSION#v}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid semver: $version"
            exit 1
          fi
          tag="v$version"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "::error::Tag $tag already exists"
            exit 1
          fi
          if [[ "$REF_NAME" != "main" ]]; then
            echo "::error::Releases must be cut from main (dispatched from: $REF_NAME)"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Build release assets
        env:
          TAG: ${{ steps.validate.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          python3 scripts/audit_distribution.py \
            --manifest-output dist/distribution-manifest.json \
            --skill-sums-output dist/SKILL_SHA256SUMS
          for skill in socratic maieutic elenchus; do
            git archive \
              --format=zip \
              --prefix="$skill/" \
              --output="dist/$skill-$TAG.zip" \
              "HEAD:skills/$skill"
          done
          git archive \
            --format=zip \
            --prefix="socratic-suite-$TAG/" \
            --output="dist/socratic-suite-$TAG.zip" \
            HEAD skills
          (
            cd dist
            sha256sum -- *.zip > SHA256SUMS
          )

      - name: Create and push annotated tag
        env:
          TAG: ${{ steps.validate.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.validate.outputs.tag }}
          DRAFT: ${{ inputs.draft }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          args=("$TAG" --verify-tag --title "$TAG" --generate-notes --target "$GITHUB_SHA" --fail-on-no-commits)
          [[ "$DRAFT" == "true" ]] && args+=(--draft)
          [[ "$PRERELEASE" == "true" ]] && args+=(--prerelease)
          gh release create "${args[@]}" \
            dist/*.zip \
            dist/SHA256SUMS \
            dist/SKILL_SHA256SUMS \
            dist/distribution-manifest.json

      - name: Verify immutable release and assets
        if: ${{ !inputs.draft }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.validate.outputs.tag }}
        run: |
          set -euo pipefail
          gh release verify "$TAG"
          for asset in dist/*; do
            gh release verify-asset "$TAG" "$asset"
          done

      - name: Summarize release
        env:
          TAG: ${{ steps.validate.outputs.tag }}
        run: |
          {
            echo "## Released $TAG"
            echo
            echo "Commit: \`$GITHUB_SHA\`"
            echo
            echo "Assets:"
            find dist -maxdepth 1 -type f -print | sort | sed 's#^#- #'
          } >> "$GITHUB_STEP_SUMMARY"
